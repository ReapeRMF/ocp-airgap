[defaults]
# Dynamic inventory based on ENV variable (dev or production)
inventory = environments/{{ lookup('env','ENV') | default('dev') }}/hosts
vars_files = environments/{{ lookup('env','ENV') | default('dev') }}/group_vars/all/pxe.yml

# Role path (relative to project root)
roles_path = ./roles

# General settings
remote_user = dstrafo
ask_pass = false
host_key_checking = false
timeout = 30
forks = 10

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false
sudo_flags = -H -S -n

[persistent_connection]
command_timeout = 60
