---
# hw_discovery role defaults
# These are the values used if not overridden in group_vars or host_vars.

pxe_tftp_root: /var/lib/tftpboot
pxe_http_root: /var/www/html
collector_port: 5000
collector_dir: /var/lib/hardware-inventory
bastion_ip: "{{ ansible_default_ipv4.address | default('192.168.50.10') }}"

# DHCP settings - change these for your network
dhcp_interface: eno1
dhcp_range_start: 192.168.50.100
dhcp_range_end: 192.168.50.200
dhcp_subnet: 192.168.50.0
dhcp_netmask: 255.255.255.0
dhcp_lease_time: 12h

# Where the prepared offline artifacts live after extraction
offline_artifacts_dir: /opt/offline-artifacts-x86_64

# DHCP backend. Supported values: "isc" (default) or "dnsmasq"
# ISC DHCP (dhcpd) + tftp-server is what ultimately worked reliably in testing.
# dnsmasq is kept as an alternative (simpler, single process) but had more issues.
dhcp_backend: isc
