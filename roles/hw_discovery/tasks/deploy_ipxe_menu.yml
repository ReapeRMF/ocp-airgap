---
# roles/hw_discovery/tasks/deploy_ipxe_menu.yml
# Deploys the iPXE boot menu (rendered from template)

- name: Ensure iPXE directory exists
  ansible.builtin.file:
    path: /var/www/html/ipxe
    state: directory
    mode: '0755'
  become: true

- name: Deploy iPXE boot menu
  ansible.builtin.template:
    src: ipxe/boot.ipxe.j2
    dest: /var/www/html/ipxe/boot.ipxe
    mode: '0644'
  become: true
  notify: Restart httpd
