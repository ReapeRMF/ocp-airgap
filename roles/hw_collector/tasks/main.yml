---
- name: Create collector user and group
  ansible.builtin.group:
    name: "{{ collector_group }}"
    system: true
  ansible.builtin.user:
    name: "{{ collector_user }}"
    group: "{{ collector_group }}"
    system: true
    shell: /sbin/nologin
    home: "{{ collector_dir }}"

- name: Create collector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ collector_user }}"
    group: "{{ collector_group }}"
    mode: '0755'
  loop:
    - "{{ collector_dir }}"
    - "{{ collector_dir }}/reports"

- name: Install python3 and gunicorn (system packages)
  ansible.builtin.package:
    name:
      - python3
      - python3-pip
      - python3-virtualenv
    state: present

- name: Check if offline wheel directory exists
  ansible.builtin.stat:
    path: "{{ offline_wheel_dir }}"
  register: wheel_dir_stat

- name: Create virtualenv and install from local wheels (air-gapped mode)
  ansible.builtin.pip:
    name:
      - gunicorn
      - flask
    virtualenv: "{{ collector_venv }}"
    virtualenv_command: /usr/bin/python3 -m venv
    extra_args: "--find-links {{ offline_wheel_dir }} --no-index"
  when: wheel_dir_stat.stat.exists

- name: Create virtualenv and install from PyPI (connected mode)
  ansible.builtin.pip:
    name:
      - gunicorn
      - flask
    virtualenv: "{{ collector_venv }}"
    virtualenv_command: /usr/bin/python3 -m venv
  when: not wheel_dir_stat.stat.exists

- name: Deploy collector application (placeholder)
  ansible.builtin.copy:
    content: |
      from flask import Flask, request, jsonify
      import os
      import json
      from datetime import datetime

      app = Flask(__name__)
      REPORT_DIR = "{{ collector_dir }}/reports"

      @app.route('/api/inventory', methods=['POST'])
      def receive_inventory():
          data = request.get_json(force=True)
          mac = data.get('mac', 'unknown').replace(':', '-')
          filename = os.path.join(REPORT_DIR, f"{mac}.json")
          with open(filename, 'w') as f:
              json.dump(data, f, indent=2)
          return jsonify({"status": "ok", "saved": filename}), 200

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port={{ collector_port }})
    dest: "{{ collector_dir }}/collector.py"
    owner: "{{ collector_user }}"
    group: "{{ collector_group }}"
    mode: '0644'

- name: Deploy systemd service for the collector
  ansible.builtin.template:
    src: hw_collector.service.j2
    dest: /etc/systemd/system/hw_collector.service
    mode: '0644'
  notify: Restart hw_collector

- name: Enable and start collector service
  ansible.builtin.service:
    name: hw_collector
    state: started
    enabled: true
